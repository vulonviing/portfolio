name: Sync GitHub Readmes

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync-project-readmes
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: portfolio-readme-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync GitHub READMEs
        run: python scripts/sync_github_readmes.py

      - name: Rebuild static pages
        run: python scripts/build_static_site.py

      - name: Commit synced content
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A content projects research projects.html research.html sitemap.xml
          git commit -m "Sync GitHub README content"
          git push
